<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="../img/dark-bg-ico.ico">
</head>
<body>
    <h1 class="andika-bold link"><a href="/index.php" class="link">RPG Handy Helper</a></h1>
    <main>
        <h2 class="andika-bold">Register your account</h2>
        <form action="">
            <label for="nickname" class="andika-bold">Nickname:</label>
            <input type="text" placeholder="Enter Nickname" class="container" maxlength="42" name="nickname">
            <label for="email" class="andika-bold">Email address:</label>
            <input type="text" placeholder="Enter email address" class="container" name="email">
            <label for="emailrepeat" class="andika-bold">Repeat your email address:</label>
            <input type="text" placeholder="Enter email address" class="container" name="emailrepeat">
            <label for="password" class="andika-bold">Password:</label>
            <input type="password" placeholder="Enter passoword" class="container" name="password">
            <label for="passowrdrepeat" class="andika-bold">Repeat your password:</label>
            <input type="password" placeholder="Repeat password" class="container" name="passowrdrepeat">
            <button type="submit">Register</button>
        </form>
        <h1 class="andika-bold registerlink">Already have an account? <a href="login.html" class="register">Login here</a> </h1>
    </main>
</body>
</html>
