<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Logowanie</title>
</head>
<body>
    <header class="andika-bold">
        <h1>RPG Handy Helper</h1>
    </header>
    <main>
        <h2>Log in to your account</h2> <br>
        <form action="">
                <label for="nickname">Nickname:</label> <br>
                <input type="text" placeholder="Enter Username" name="nickname" required> <br>
                <label for="password">Password:</label> <br>
                <input type="password" placeholder="Enter Password" name="password" required> <br>
                <button type="submit">Login</button>
            <label>
                <input type="checkbox" name="remember" class="checkbtn">Remember me <br>
            </label>
                <button type="button" class="cancelbtn">Cancel</button>
            <a href="">Forgot password?</a>
            Don't have an account? <a href="">Register it here</a> 
        </form>
    </main>
</body>


</html>
