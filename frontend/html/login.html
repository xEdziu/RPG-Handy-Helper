<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../img/dark-bg-ico.ico">
</head>
<body>
    <h1 class="andika-bold">RPG Handy Helper</h1>
    <main>
        <h2>Log in to your account</h2> <br>
        <form action="">
            <label for="nickname">Nickname:</label> 
            <input type="text" placeholder="Enter Username" name="nickname" required maxlength="42" class="container"> 
            <label for="password">Password:</label> 
            <input type="password" placeholder="Enter Password" name="password" required maxlength="42" class="container">
            <button type="submit">Login</button> <br>
            <div class="checkandforgot">
                <label class="checkbtn">
                    <input type="checkbox" checked="checked">
                    <span class="checkmark">Remember me?</span>
                </label>
                <span class="forgor">Forgot password? &nbsp;</span><a href="resetpassword.html"> Click here</a>
            </div>
        </form>
    </main>
    <h1 class="registerlink">Don't have an account? <a href="register.html">Register it here</a> </h1>
</body>


</html>
